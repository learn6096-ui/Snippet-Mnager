# =============================================
# SnipVCS Backend Configuration
# =============================================

server.port=8080

# =============================================
# H2 In-Memory Database (Works out of the box)
# =============================================
spring.datasource.url=jdbc:h2:mem:snipvcs;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (accessible at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =============================================
# PostgreSQL (Uncomment when you have PostgreSQL)
# =============================================
# spring.datasource.url=jdbc:postgresql://localhost:5432/snipvcs
# spring.datasource.username=snipvcs
# spring.datasource.password=snipvcs_secret
# spring.datasource.driver-class-name=org.postgresql.Driver

# --- Connection Pool ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# --- Schema Initialization ---
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-h2.sql
spring.sql.init.continue-on-error=false

# --- Jackson JSON ---
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# --- Virtual Threads (JDK 21+, uncomment if on 21+) ---
# spring.threads.virtual.enabled=true
